<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 500">
  <defs>
    <style>
      .text { font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace; }
      .code { font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace; font-size: 11px; }
      .ln { font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace; font-size: 10px; fill: #45475a; text-anchor: end; }
      .tab { font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace; font-size: 11px; fill: #cdd6f4; }
      .brand { fill: #cba6f7; }
      .dim { fill: #6c7086; }
      .kw { fill: #cba6f7; }
      .fn { fill: #89b4fa; }
      .st { fill: #a6e3a1; }
      .pr { fill: #94e2d5; }
      .vr { fill: #fab387; }
      .tx { fill: #cdd6f4; }
      .op { fill: #9399b2; }
      .prompt { fill: #89b4fa; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1120" height="500" rx="10" ry="10" fill="#1e1e2e" />
  <rect width="1120" height="36" rx="10" ry="10" fill="#181825" />
  <rect y="26" width="1120" height="10" fill="#181825" />
  <circle cx="20" cy="18" r="6" fill="#f38ba8" />
  <circle cx="40" cy="18" r="6" fill="#f9e2af" />
  <circle cx="60" cy="18" r="6" fill="#a6e3a1" />
  <text class="text dim" font-size="12" x="560" y="22" text-anchor="middle">funkai</text>

  <!-- FUNKAI logo -->
  <g transform="translate(560, 0)">
    <text class="text brand" font-size="14" y="60" text-anchor="middle" xml:space="preserve">в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•—   в–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв•—   в–Ҳв–Ҳв•—в–Ҳв–Ҳв•—  в–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв•—</text>
    <text class="text brand" font-size="14" y="76" text-anchor="middle" xml:space="preserve">в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘ в–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘</text>
    <text class="text brand" font-size="14" y="92" text-anchor="middle" xml:space="preserve">в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в–Ҳв–Ҳв•— в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘</text>
    <text class="text brand" font-size="14" y="108" text-anchor="middle" xml:space="preserve">в–Ҳв–Ҳв•”в•җв•җв•қ  в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв–Ҳв–Ҳв•— в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘</text>
    <text class="text brand" font-size="14" y="124" text-anchor="middle" xml:space="preserve">в–Ҳв–Ҳв•‘     в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘ в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘</text>
    <text class="text brand" font-size="14" y="140" text-anchor="middle" xml:space="preserve">в•ҡв•җв•қ      в•ҡв•җв•җв•җв•җв•җв•қ в•ҡв•җв•қ  в•ҡв•җв•җв•җв•қв•ҡв•җв•қ  в•ҡв•җв•қв•ҡв•җв•қ  в•ҡв•җв•қв•ҡв•җв•қ</text>
  </g>

  <!-- Tagline -->
  <text class="text dim" font-size="11" x="560" y="164" text-anchor="middle">A composable AI microframework built on ai-sdk, curried with funk-tional programming flair.</text>

  <!-- Horizontal divider -->
  <line x1="16" y1="178" x2="1104" y2="178" stroke="#313244" stroke-width="1" />

  <!-- Vertical dividers -->
  <line x1="373" y1="178" x2="373" y2="494" stroke="#313244" stroke-width="1" />
  <line x1="746" y1="178" x2="746" y2="494" stroke="#313244" stroke-width="1" />

  <!-- в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ -->
  <!-- Panel 1: agent.ts                          -->
  <!-- в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ -->

  <rect x="4" y="186" width="82" height="24" rx="4" ry="4" fill="#181825" />
  <text class="tab" x="18" y="202">agent.ts</text>
  <line x1="52" y1="214" x2="52" y2="494" stroke="#313244" stroke-width="1" />

  <!-- 1  import { agent } from '@funkai/agents' -->
  <text class="ln" x="46" y="234">1</text>
  <text class="code" x="62" y="234"><tspan class="kw">import</tspan><tspan class="op"> { </tspan><tspan class="fn">agent</tspan><tspan class="op"> } </tspan><tspan class="kw">from</tspan><tspan class="st"> '@funkai/agents'</tspan></text>

  <!-- 2  import { prompts } from '~prompts' -->
  <text class="ln" x="46" y="250">2</text>
  <text class="code" x="62" y="250"><tspan class="kw">import</tspan><tspan class="op"> { </tspan><tspan class="fn">prompts</tspan><tspan class="op"> } </tspan><tspan class="kw">from</tspan><tspan class="st"> '~prompts'</tspan></text>

  <!-- 3  (blank) -->
  <text class="ln" x="46" y="266">3</text>

  <!-- 4  const writer = agent({ -->
  <text class="ln" x="46" y="282">4</text>
  <text class="code" x="62" y="282"><tspan class="kw">const </tspan><tspan class="vr">writer</tspan><tspan class="op"> = </tspan><tspan class="fn">agent</tspan><tspan class="op">({</tspan></text>

  <!-- 5    name: 'writer', -->
  <text class="ln" x="46" y="298">5</text>
  <text class="code" x="62" y="298" xml:space="preserve"><tspan class="op">  </tspan><tspan class="pr">name</tspan><tspan class="op">: </tspan><tspan class="st">'writer'</tspan><tspan class="op">,</tspan></text>

  <!-- 6    model: 'openai/gpt-4.1', -->
  <text class="ln" x="46" y="314">6</text>
  <text class="code" x="62" y="314" xml:space="preserve"><tspan class="op">  </tspan><tspan class="pr">model</tspan><tspan class="op">: </tspan><tspan class="st">'openai/gpt-4.1'</tspan><tspan class="op">,</tspan></text>

  <!-- 7    system: prompts('writer'), -->
  <text class="ln" x="46" y="330">7</text>
  <text class="code" x="62" y="330" xml:space="preserve"><tspan class="op">  </tspan><tspan class="pr">system</tspan><tspan class="op">: </tspan><tspan class="fn">prompts</tspan><tspan class="op">(</tspan><tspan class="st">'writer'</tspan><tspan class="op">),</tspan></text>

  <!-- 8    tools: { search }, -->
  <text class="ln" x="46" y="346">8</text>
  <text class="code" x="62" y="346" xml:space="preserve"><tspan class="op">  </tspan><tspan class="pr">tools</tspan><tspan class="op">: { </tspan><tspan class="vr">search</tspan><tspan class="op"> },</tspan></text>

  <!-- 9  }) -->
  <text class="ln" x="46" y="362">9</text>
  <text class="code" x="62" y="362"><tspan class="op">})</tspan></text>

  <!-- в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ -->
  <!-- Panel 2: writer.prompt                     -->
  <!-- в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ -->

  <rect x="377" y="186" width="120" height="24" rx="4" ry="4" fill="#181825" />
  <text class="tab" x="391" y="202">writer.prompt</text>
  <line x1="425" y1="214" x2="425" y2="494" stroke="#313244" stroke-width="1" />

  <!-- 1  --- -->
  <text class="ln" x="419" y="234">1</text>
  <text class="code" x="435" y="234"><tspan class="dim">---</tspan></text>

  <!-- 2  name: writer -->
  <text class="ln" x="419" y="250">2</text>
  <text class="code" x="435" y="250"><tspan class="pr">name</tspan><tspan class="op">: </tspan><tspan class="st">writer</tspan></text>

  <!-- 3  schema: -->
  <text class="ln" x="419" y="266">3</text>
  <text class="code" x="435" y="266"><tspan class="pr">schema</tspan><tspan class="op">:</tspan></text>

  <!-- 4    tone: string -->
  <text class="ln" x="419" y="282">4</text>
  <text class="code" x="435" y="282" xml:space="preserve"><tspan class="op">  </tspan><tspan class="pr">tone</tspan><tspan class="op">: </tspan><tspan class="st">string</tspan></text>

  <!-- 5    context: -->
  <text class="ln" x="419" y="298">5</text>
  <text class="code" x="435" y="298" xml:space="preserve"><tspan class="op">  </tspan><tspan class="pr">context</tspan><tspan class="op">:</tspan></text>

  <!-- 6      type: string -->
  <text class="ln" x="419" y="314">6</text>
  <text class="code" x="435" y="314" xml:space="preserve"><tspan class="op">    </tspan><tspan class="pr">type</tspan><tspan class="op">: </tspan><tspan class="st">string</tspan></text>

  <!-- 7      required: false -->
  <text class="ln" x="419" y="330">7</text>
  <text class="code" x="435" y="330" xml:space="preserve"><tspan class="op">    </tspan><tspan class="pr">required</tspan><tspan class="op">: </tspan><tspan class="kw">false</tspan></text>

  <!-- 8  --- -->
  <text class="ln" x="419" y="346">8</text>
  <text class="code" x="435" y="346"><tspan class="dim">---</tspan></text>

  <!-- 9  (blank) -->
  <text class="ln" x="419" y="362">9</text>

  <!-- 10 You are a {{ tone }} writer. -->
  <text class="ln" x="419" y="378">10</text>
  <text class="code" x="435" y="378"><tspan class="tx">You are a </tspan><tspan class="vr">{{ tone }}</tspan><tspan class="tx"> writer.</tspan></text>

  <!-- 11 {% if context %}{{ context }}{% endif %} -->
  <text class="ln" x="419" y="394">11</text>
  <text class="code" x="435" y="394"><tspan class="kw">{% if context %}</tspan><tspan class="vr">{{ context }}</tspan><tspan class="kw">{% endif %}</tspan></text>

  <!-- в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ -->
  <!-- Panel 3: terminal                          -->
  <!-- в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ -->

  <rect x="750" y="186" width="82" height="24" rx="4" ry="4" fill="#181825" />
  <text class="tab" x="764" y="202">terminal</text>

  <!-- ~ $ prompts generate -->
  <text class="code" x="764" y="234"><tspan class="prompt">~</tspan><tspan class="dim"> $ </tspan><tspan class="tx">prompts generate</tspan></text>

  <!--   вң“ Scanned 4 prompt files -->
  <text class="code" x="764" y="250" xml:space="preserve"><tspan class="st">  &#x2713;</tspan><tspan class="tx"> Scanned 4 prompt files</tspan></text>

  <!--   вң“ Generated typed client -->
  <text class="code" x="764" y="266" xml:space="preserve"><tspan class="st">  &#x2713;</tspan><tspan class="tx"> Generated typed client</tspan></text>

  <!--   вң“ Validated all schemas -->
  <text class="code" x="764" y="282" xml:space="preserve"><tspan class="st">  &#x2713;</tspan><tspan class="tx"> Validated all schemas</tspan></text>

  <!-- (blank line) -->

  <!-- ~ $ node index.ts -->
  <text class="code" x="764" y="314"><tspan class="prompt">~</tspan><tspan class="dim"> $ </tspan><tspan class="tx">node index.ts</tspan></text>

  <!--   вң“ Agent "writer" ready -->
  <text class="code" x="764" y="330" xml:space="preserve"><tspan class="st">  &#x2713;</tspan><tspan class="tx"> Agent </tspan><tspan class="brand">"writer"</tspan><tspan class="tx"> ready</tspan></text>

  <!--   вң“ Generated response -->
  <text class="code" x="764" y="346" xml:space="preserve"><tspan class="st">  &#x2713;</tspan><tspan class="tx"> Generated response</tspan></text>

  <!-- (blank line) -->

  <!-- ~ $ в–Ҳ -->
  <text class="code" x="764" y="378"><tspan class="prompt">~</tspan><tspan class="dim"> $ </tspan><tspan class="tx">&#x2588;</tspan></text>

</svg>
