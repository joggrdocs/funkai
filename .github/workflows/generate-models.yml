name: Generate Models

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install

      - name: Generate models
        run: pnpm --filter=@funkai/models generate:models --force

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet packages/models/src/catalog/providers/ packages/models/src/providers/ packages/models/package.json packages/models/.generated/entries.json || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Validate generated data
        if: steps.changes.outputs.changed == 'true'
        run: pnpm build --filter=@funkai/models && pnpm typecheck --filter=@funkai/models && pnpm test --filter=@funkai/models

      - name: Create changeset
        if: steps.changes.outputs.changed == 'true'
        run: |
          CHANGESET_ID="$(date -u +'%Y%m%d')-models-update"
          cat > ".changeset/${CHANGESET_ID}.md" << 'CHANGESET_EOF'
---
"@funkai/models": patch
---

Update model catalog with latest data from models.dev
CHANGESET_EOF

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/models/src/catalog/providers/ packages/models/src/providers/ packages/models/package.json packages/models/.generated/entries.json .changeset/
          git commit -m "chore(packages/models): update model catalog"
          git push
